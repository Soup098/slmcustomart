<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>SlmCustomArt</title>
        <!-- <meta name="description" content=""> -->
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="/styles.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    </head>
    <body>
        <main>
            <div class="main-img-container">
                <img class="main-img" src="/images/logos/logo-2-transparent.png" alt="">
            </div>
            
            <nav>
                <div class="nav-items">
                    <a href="/index.html">HOME</a>
                    <div class="nav-dropdown">
                        <a href="#">GALLERY</a>
                        <div class="dropdown-menu">
                            <a href="/pages/gallery/pets-gallery.html">Pet Portraits</a>
                            <a href="/pages/gallery/homes-gallery.html">Home Portraits</a>
                        </div>
                    </div>
                    <div class="nav-dropdown">
                        <a href="">ABOUT</a>
                        <div class="dropdown-menu">
                            <a href="/pages/about/artist.html">Meet The Artist</a>
                            <a href="/pages/about/process.html">Process</a>
                            <a href="/pages/personalization.html">Personalization</a>
                        </div>
                    </div>
                    <div class="nav-dropdown">
                        <a href="">ORDERING</a>
                        <div class="dropdown-menu">
                            <a href="/pages/ordering/how-to-order.html">How To</a>
                            <a href="/pages/ordering/photo-tips.html">Photo Tips</a>
                            <a href="/pages/ordering/pricing.html">Pricing</a>
                        </div>
                    </div>
                    <a href="/pages/contact.html">CONTACT</a>
                </div>
            </nav>

            <section class="order-section">
                <div class="order-container">
                    <h1 class="order-title">Contact</h1>
                    <p class="order-subtitle">
                        slmcustomart@gmail.com | 603-241-2542 | or fill out the form below
                    </p>

                    <form class="order-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel">
                        </div>
                        <div class="form-group">
                            <label>Portrait Type *</label>
                            <select required>
                                <option value="">Select an option</option>
                                <option>Home Portrait</option>
                                <option>Pet Portrait</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tell me about your vision — I’ll bring it to life *</label>
                            <textarea rows="5" required></textarea>
                        </div>
                        <button type="submit" class="order-submit">
                            Submit
                        </button>
                    </form>
                </div>
            </section>
        
        
            <footer>
                <p>© 2026 SLM Custom Art</p>
            </footer>

        </main>
       
        
        <script src="index.js"></script>
    </body>
</html>
