            <section class="order-section">
                <div class="order-container">
                    <h1 class="order-title">Contact</h1>
                    <p class="order-subtitle">
                        slmcustomart@gmail.com | 603-241-2542 | or fill out the form below
                    </p>

                    <form class="order-form" id="contact-form">
                        <input type="hidden" name="access_key" value="75811546-90d4-45fc-804d-a25624aec405">
                        <input type="hidden" name="subject" value="New Portrait Inquiry - SLM Custom Art">
                        <input type="hidden" name="from_name" value="SLM Custom Art Website">

                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" name="First Name" id="firstName" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" name="Last Name" id="lastName" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" name="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="Phone" id="phone">
                        </div>
                        <div class="form-group">
                            <label>Portrait Type *</label>
                            <select name="Portrait Type" id="portraitType" required>
                                <option value="">Select an option</option>
                                <option>Home Portrait</option>
                                <option>Pet Portrait</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tell me about your vision — I’ll bring it to life *</label>
                            <textarea name="message" id="message" rows="5" required></textarea>
                        </div>

                        <!-- Honeypot: real visitors never see or fill this in -->
                         <input type="checkbox" name="botcheck" id="botcheck" style="display:none;" tabindex="-1" autocomplete="off">

                        <button type="submit" class="order-submit">Submit</button>
                        <p id="form-status" class="order-subtitle" style="margin-top:10px;"></p>
                    </form>
                </div>
            </section>
