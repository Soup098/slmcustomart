            <section class="page-title">Home Potraits</section>
            <section class="gallery" id="gallery">
                <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                <script>
                    const SUPABASE_URL = "https://eklumrribtzzkxssuojv.supabase.co"
                    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrbHVtcnJpYnR6emt4c3N1b2p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTc2NzEsImV4cCI6MjA5NTU5MzY3MX0.w-33diostKvrJC3Yq-cq85EDEfFZ66CJmmXHXjEBi70"
                    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
                    const CATEGORY = "home"

                    function escapeHtml(str){
                        return String(str ?? "")
                            .replace(/&/g, "&amp;")
                            .replace(/</g, "&lt;")
                            .replace(/>/g, "&gt;")
                            .replace(/"/g, "&quot;")
                    }

                    async function loadGallery(){
                        const grid = document.getElementById("gallery")
                        const { data, error } = await db
                            .from("portraits")
                            .select("*")
                            .eq("category", CATEGORY)
                            .order("display_order")
                        
                        if(error) {
                            console.log(error)
                            return
                        }

                        grid.innerHTML = data.map(piece => `
                            <figure class="card">
                                <img src="${escapeHtml(piece.image_url)}" alt="portrait: ${escapeHtml(piece.title)}" loading="lazy">
                                <figcaption class="card-title">${escapeHtml(piece.title)}</figcaption>
                            </figure>
                        `).join("")
                    }

                    loadGallery()
                </script>
            </section>
