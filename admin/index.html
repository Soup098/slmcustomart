<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>SLM Custom Art - Admin</title>
    <link rel="stylesheet" href="/admin/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <section id="login-view" class="login-view">
        <form id="login-form" class="login-card">
            <h1>Admin Login</h1>
            <input id="email" type="email" placeholder="Email" required>
            <input id="password" type="password" placeholder="Password" required>
            <button type="submit">Sign in</button>
            <p id="login-msg" class="msg"></p>
        </form>
    </section>
    <!-- DASHBOARD SCREEN (hidden until logged in) -->
    <section id="dashboard-view" class="dashboard-view" hidden>
        <header class="bar">
            <h1>Gallery Manager</h1>
            <button id="logout-btn" class="ghost">Log out</button>
        </header>
        <!-- upload form goes here (Section 4) -->
        <!-- thumbnail grids go here (Section 5) -->
    </section>
    <script src="/admin/admin.js"></script>
</body>
</html>
