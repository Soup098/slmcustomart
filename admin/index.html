<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>SLM Custom Art - Admin</title>
    <link rel="stylesheet" href="/admin/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <section id="login-view" class="login-view">
        <form id="login-form" class="login-card">
            <h1>Admin Login</h1>
            <input id="email" type="email" placeholder="Email" required>
            <input id="password" type="password" placeholder="Password" required>
            <button type="submit">Sign in</button>
            <p id="login-msg" class="msg"></p>
        </form>
    </section>
    <!-- DASHBOARD SCREEN (hidden until logged in) -->
    <section id="dashboard-view" class="dashboard-view" hidden>
        <header class="bar">
            <h1>Gallery Manager</h1>
            <button id="logout-btn" class="ghost">Log out</button>
        </header>

        <div class="dashboard-layout">
            <!-- LEFT: upload panel -->
            <form id="upload-form" class="panel">
                <h2>Add a portrait</h2>

                <label class="field">
                    <span class="field-label">Title</span>
                    <input id="title" type="text" placeholder="e.g. Bella the Labrador" required>
                </label>

                <label class="field">
                    <span class="field-label">Short description</span>
                    <textarea id="description" placeholder="A sentence about this piece"></textarea>
                </label>

                <div class="field">
                    <span class="field-label">Gallery</span>
                    <div class="segmented">
                        <label class="seg">
                            <input type="radio" name="category" value="pet" checked>
                            <span>Pet</span>
                        </label>
                        <label class="seg">
                            <input type="radio" name="category" value="home">
                            <span>Home</span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <span class="field-label">Photo</span>
                    <!-- drag-and-drop target (also clickable to browse) -->
                    <div id="dropzone" class="dropzone">
                        <svg class="dropzone-icon" viewBox="0 0 24 24" width="34" height="34"
                             fill="none" stroke="currentColor" stroke-width="1.6"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span class="dropzone-text">
                            <strong>Drag a photo here</strong>
                            or click to browse
                        </span>
                    </div>
                    <input id="file-input" type="file" accept="image/*" hidden>

                    <!-- preview shown after a file is chosen -->
                    <figure id="preview-wrap" class="preview-wrap" hidden>
                        <img id="preview" class="preview" alt="">
                        <button type="button" id="preview-remove" class="preview-remove"
                                aria-label="Remove photo">&times;</button>
                        <figcaption id="preview-name" class="preview-name"></figcaption>
                    </figure>
                </div>

                <button type="submit">Upload to gallery</button>
                <p id="upload-msg" class="msg"></p>
            </form>

            <!-- RIGHT: stacked gallery grids -->
            <div class="gallery-column">
                <section class="panel">
                    <h2>Pet portraits</h2>
                    <div id="pet-grid" class="grid"></div>
                </section>
                <section class="panel">
                    <h2>Home portraits</h2>
                    <div id="home-grid" class="grid"></div>
                </section>
            </div>
        </div>

    </section>
    <script src="/admin/admin.js"></script>
</body>
</html>
